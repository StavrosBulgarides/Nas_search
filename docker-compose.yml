version: "3.8"

services:
  nas-search:
    build: .
    container_name: nas-search
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persistent storage for the search database
      - nas_search_data:/app/data

      # Persistent config so settings survive container rebuilds
      - ./config.yml:/app/config.yml

      # NAS volumes (read-only) — adjust paths to match your NAS shared folders
      # - /volume1/YourFolder:/mnt/nas/YourFolder:ro
      - /volume1/Books:/mnt/nas/Books:ro
      - /volume1/Movies:/mnt/nas/Movies:ro

volumes:
  nas_search_data:
