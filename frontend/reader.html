<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Wizard - Reader</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(22, 33, 62, 0.95);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            border-bottom: 1px solid #0f3460;
            transition: opacity 0.3s;
        }

        #toolbar.autohide { opacity: 0; }
        #toolbar.autohide:hover { opacity: 1; }

        #title {
            font-size: 0.85rem;
            color: #888;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 40%;
        }

        #controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #controls button {
            padding: 6px 14px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            background: #1a1a2e;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.85rem;
        }

        #controls button:hover { border-color: #e94560; color: #e94560; }
        #controls button:disabled { opacity: 0.3; cursor: default; }

        #page-info {
            font-size: 0.85rem;
            color: #888;
            min-width: 80px;
            text-align: center;
        }

        #fit-toggle {
            font-size: 0.8rem;
            color: #888;
            cursor: pointer;
        }

        #fit-toggle:hover { color: #e94560; }

        #viewer {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 52px 0 16px;
            cursor: pointer;
            min-height: 100vh;
        }

        #viewer img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        #viewer img.fit-width {
            width: 100%;
            max-width: 900px;
        }

        #viewer img.fit-height {
            max-height: calc(100vh - 68px);
            width: auto;
        }

        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            color: #888;
            font-size: 1rem;
        }

        #error {
            color: #e94560;
            padding: 40px;
            text-align: center;
            display: none;
        }

        #error-detail {
            color: #888;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        a { color: #e94560; text-decoration: none; }
    </style>
</head>
<body>
    <div id="toolbar">
        <div id="title"></div>
        <div id="controls">
            <button id="prev-btn" disabled>Prev</button>
            <span id="page-info">--</span>
            <button id="next-btn" disabled>Next</button>
            <span id="fit-toggle" title="Toggle fit mode">Fit: Width</span>
            <a href="/" style="font-size:0.85rem;">Back</a>
        </div>
    </div>

    <div id="loading">Extracting comic...</div>

    <div id="viewer" style="display:none">
        <img id="page-img" />
    </div>

    <div id="error">
        <p>Failed to load comic.</p>
        <p id="error-detail"></p>
        <p style="margin-top:12px"><a href="/">Back to search</a></p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const filePath = params.get('path');
        const fileName = filePath ? filePath.split('/').pop() : 'Unknown';
        const encodedPath = encodeURIComponent(filePath);

        document.getElementById('title').textContent = fileName;
        document.title = fileName + ' - Search Wizard';

        let totalPages = 0;
        let currentPage = 0;
        let fitMode = 'width';

        const img = document.getElementById('page-img');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const pageInfo = document.getElementById('page-info');
        const fitToggle = document.getElementById('fit-toggle');
        const viewer = document.getElementById('viewer');

        function showPage(index) {
            if (index < 0 || index >= totalPages) return;
            currentPage = index;
            img.src = `/api/comic/page/${currentPage}?path=${encodedPath}`;
            img.className = fitMode === 'width' ? 'fit-width' : 'fit-height';
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage === totalPages - 1;
            pageInfo.textContent = `${currentPage + 1} / ${totalPages}`;
            window.scrollTo(0, 0);
        }

        function nextPage() {
            if (currentPage < totalPages - 1) showPage(currentPage + 1);
        }

        function prevPage() {
            if (currentPage > 0) showPage(currentPage - 1);
        }

        prevBtn.addEventListener('click', (e) => { e.stopPropagation(); prevPage(); });
        nextBtn.addEventListener('click', (e) => { e.stopPropagation(); nextPage(); });

        fitToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            fitMode = fitMode === 'width' ? 'height' : 'width';
            fitToggle.textContent = 'Fit: ' + (fitMode === 'width' ? 'Width' : 'Height');
            img.className = fitMode === 'width' ? 'fit-width' : 'fit-height';
        });

        viewer.addEventListener('click', (e) => {
            const rect = viewer.getBoundingClientRect();
            const x = e.clientX - rect.left;
            if (x < rect.width / 3) {
                prevPage();
            } else {
                nextPage();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
            if (e.key === 'Home') { e.preventDefault(); showPage(0); }
            if (e.key === 'End') { e.preventDefault(); showPage(totalPages - 1); }
        });

        let hideTimeout;
        function resetToolbarHide() {
            const toolbar = document.getElementById('toolbar');
            toolbar.classList.remove('autohide');
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => toolbar.classList.add('autohide'), 3000);
        }
        document.addEventListener('mousemove', resetToolbarHide);

        function showError(detail) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = '';
            if (detail) document.getElementById('error-detail').textContent = detail;
        }

        async function loadComic() {
            if (!filePath) {
                showError('No file path specified.');
                return;
            }

            try {
                const resp = await fetch(`/api/comic/info?path=${encodedPath}`);
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.detail || `Server returned ${resp.status}`);
                }

                const data = await resp.json();
                totalPages = data.pages;

                document.getElementById('loading').style.display = 'none';
                viewer.style.display = 'flex';
                showPage(0);
                resetToolbarHide();

            } catch (err) {
                console.error('Failed to load comic:', err);
                showError(err.message);
            }
        }

        loadComic();
    </script>
</body>
</html>
