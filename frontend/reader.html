<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Wizard - Reader</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #toolbar {
            background: rgba(22, 33, 62, 0.95);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            border-bottom: 1px solid #0f3460;
            transition: opacity 0.3s;
            flex-shrink: 0;
            position: relative;
        }

        #toolbar.autohide { opacity: 0; }
        #toolbar.autohide:hover { opacity: 1; }

        #title {
            font-size: 1rem;
            color: #888;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 30%;
            min-width: 0;
            flex-shrink: 1;
        }

        #page-info-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            color: #e0e0e0;
            white-space: nowrap;
        }

        #page-info-center .page-pct {
            color: #e94560;
            margin-left: 8px;
        }

        #controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #controls button {
            padding: 6px 14px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            background: #1a1a2e;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 1rem;
        }

        #controls button:hover { border-color: #e94560; color: #e94560; }
        #controls button:disabled { opacity: 0.3; cursor: default; }

        #fit-toggle {
            font-size: 1rem;
            color: #888;
            cursor: pointer;
        }

        #fit-toggle:hover { color: #e94560; }

        #main-container {
            flex: 1;
            display: flex;
            min-height: 0;
            position: relative;
        }

        #viewer-wrap {
            flex: 1;
            overflow-y: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            cursor: pointer;
            padding: 16px 0;
        }

        #viewer-wrap img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        #viewer-wrap img.fit-width {
            width: 100%;
            max-width: 900px;
        }

        #viewer-wrap img.fit-height {
            max-height: calc(100vh - 68px);
            width: auto;
        }

        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #888;
            font-size: 1rem;
        }

        #error {
            color: #e94560;
            padding: 40px;
            text-align: center;
            display: none;
        }

        #error-detail {
            color: #888;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        a { color: #e94560; text-decoration: none; }

        /* Bookmarks panel */
        #bookmarks-panel {
            width: 380px;
            border-left: 1px solid #0f3460;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: width 0.2s;
        }

        #bookmarks-panel.collapsed {
            width: 0;
            overflow: hidden;
            border-left: none;
        }

        #bookmarks-panel-header {
            padding: 10px 14px;
            border-bottom: 1px solid #0f3460;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #bookmark-now-btn {
            padding: 3px 10px;
            border: 1px solid #e94560;
            border-radius: 4px;
            background: #e94560;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
            text-transform: none;
            letter-spacing: 0;
        }

        #bookmark-now-btn:hover { background: #c73650; }

        #bookmarks-collapse-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 1rem;
            padding: 0 4px;
        }

        #bookmarks-collapse-btn:hover { color: #e94560; }

        #bookmarks-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        #bookmarks-list li {
            padding: 8px 14px;
            border-bottom: 1px solid #1a1a3e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            cursor: pointer;
        }

        #bookmarks-list li:hover { background: #16213e; }
        #bookmarks-list .bm-info { flex: 1; min-width: 0; }
        #bookmarks-list .bm-page { color: #e94560; font-size: 0.8rem; }
        #bookmarks-list .bm-file { color: #666; font-size: 0.7rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #bookmarks-list .bm-note { color: #888; font-size: 0.75rem; margin-top: 2px; }
        #bookmarks-list .bm-date { color: #555; font-size: 0.65rem; }

        #bookmarks-list .bm-section {
            padding: 8px 14px 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #0f3460;
            cursor: default;
        }

        #bookmarks-list .bm-section:hover { background: none; }

        #bookmarks-list .bm-delete {
            color: #666;
            cursor: pointer;
            padding: 4px 8px;
            flex-shrink: 0;
        }

        #bookmarks-list .bm-delete:hover { color: #e94560; }

        #bookmarks-empty {
            padding: 20px 14px;
            color: #666;
            font-size: 0.8rem;
            text-align: center;
        }

        #bookmarks-list li.current-book .bm-page { color: #c45aff; }

        /* Bookmark toggle tab */
        #bookmarks-tab {
            display: none;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            writing-mode: vertical-rl;
            background: #16213e;
            border: 1px solid #0f3460;
            border-right: none;
            border-radius: 4px 0 0 4px;
            padding: 10px 6px;
            cursor: pointer;
            color: #888;
            font-size: 0.75rem;
            z-index: 6;
            letter-spacing: 0.5px;
        }

        #bookmarks-tab:hover { color: #e94560; border-color: #e94560; }

        /* Confirm dialog */
        .confirm-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 60;
            align-items: center;
            justify-content: center;
        }

        .confirm-modal.show { display: flex; }

        .confirm-modal .modal-box {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 24px;
            width: 340px;
            text-align: center;
        }

        .confirm-modal .modal-box p {
            margin-bottom: 20px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .confirm-modal .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .confirm-modal .modal-buttons button {
            padding: 8px 20px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            background: #1a1a2e;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .confirm-modal .modal-buttons button:hover { border-color: #e94560; color: #e94560; }
        .confirm-modal .modal-buttons button.primary { background: #e94560; border-color: #e94560; color: white; }
        .confirm-modal .modal-buttons button.primary:hover { background: #c73650; }

        @media (max-width: 768px) {
            #bookmarks-panel { display: none; }
            #bookmarks-tab { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <div id="title"></div>
        <div id="page-info-center">
            <span id="page-display">-- / --</span>
            <span class="page-pct" id="pct-display">0%</span>
        </div>
        <div id="controls">
            <button id="prev-btn" disabled>Prev</button>
            <button id="next-btn" disabled>Next</button>
            <span id="fit-toggle" title="Toggle fit mode">Fit: Width</span>
            <a href="/" id="back-btn" style="font-size:1rem;">Back</a>
        </div>
    </div>

    <div id="main-container">
        <div id="loading">Extracting comic...</div>

        <div id="viewer-wrap" style="display:none">
            <img id="page-img" />
        </div>

        <div id="bookmarks-tab">Bookmarks</div>

        <div id="bookmarks-panel">
            <div id="bookmarks-panel-header">
                <span>Bookmarks</span>
                <div style="display:flex;gap:8px;align-items:center;">
                    <button id="bookmark-now-btn">Bookmark This Page</button>
                    <button id="bookmarks-collapse-btn" title="Collapse">&raquo;</button>
                </div>
            </div>
            <ul id="bookmarks-list"></ul>
        </div>
    </div>

    <div id="error">
        <p>Failed to load comic.</p>
        <p id="error-detail"></p>
        <p style="margin-top:12px"><a href="/">Back to search</a></p>
    </div>

    <div id="confirm-dialog" class="confirm-modal">
        <div class="modal-box">
            <p id="confirm-message"></p>
            <div class="modal-buttons" id="confirm-buttons"></div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const filePath = params.get('path');
        const fileName = filePath ? filePath.split('/').pop() : 'Unknown';
        const encodedPath = encodeURIComponent(filePath);

        document.getElementById('title').textContent = fileName;
        document.title = fileName + ' - Search Wizard';

        let totalPages = 0;
        let currentPage = 0;
        let fitMode = 'width';
        let allBookmarks = [];

        const img = document.getElementById('page-img');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const fitToggle = document.getElementById('fit-toggle');
        const viewerWrap = document.getElementById('viewer-wrap');

        function showPage(index) {
            if (index < 0 || index >= totalPages) return;
            currentPage = index;
            img.src = `/api/comic/page/${currentPage}?path=${encodedPath}`;
            img.className = fitMode === 'width' ? 'fit-width' : 'fit-height';
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage === totalPages - 1;
            document.getElementById('page-display').textContent = `Page ${currentPage + 1} / ${totalPages}`;
            const pct = totalPages > 0 ? Math.round(((currentPage + 1) / totalPages) * 100) : 0;
            document.getElementById('pct-display').textContent = pct + '%';
            viewerWrap.scrollTo(0, 0);
        }

        function nextPage() {
            if (currentPage < totalPages - 1) showPage(currentPage + 1);
        }

        function prevPage() {
            if (currentPage > 0) showPage(currentPage - 1);
        }

        prevBtn.addEventListener('click', (e) => { e.stopPropagation(); prevPage(); });
        nextBtn.addEventListener('click', (e) => { e.stopPropagation(); nextPage(); });

        fitToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            fitMode = fitMode === 'width' ? 'height' : 'width';
            fitToggle.textContent = 'Fit: ' + (fitMode === 'width' ? 'Width' : 'Height');
            img.className = fitMode === 'width' ? 'fit-width' : 'fit-height';
        });

        viewerWrap.addEventListener('click', (e) => {
            const rect = viewerWrap.getBoundingClientRect();
            const x = e.clientX - rect.left;
            if (x < rect.width / 3) {
                prevPage();
            } else {
                nextPage();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (document.querySelector('.confirm-modal.show')) return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
            if (e.key === 'Home') { e.preventDefault(); showPage(0); }
            if (e.key === 'End') { e.preventDefault(); showPage(totalPages - 1); }
        });

        let hideTimeout;
        function resetToolbarHide() {
            const toolbar = document.getElementById('toolbar');
            toolbar.classList.remove('autohide');
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => toolbar.classList.add('autohide'), 3000);
        }
        document.addEventListener('mousemove', resetToolbarHide);

        function showError(detail) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = '';
            if (detail) document.getElementById('error-detail').textContent = detail;
        }

        async function loadComic() {
            if (!filePath) {
                showError('No file path specified.');
                return;
            }

            try {
                const resp = await fetch(`/api/comic/info?path=${encodedPath}`);
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.detail || `Server returned ${resp.status}`);
                }

                const data = await resp.json();
                totalPages = data.pages;

                document.getElementById('loading').style.display = 'none';
                viewerWrap.style.display = 'flex';
                const startPage = parseInt(params.get('page')) || 0;
                showPage(Math.min(startPage, totalPages - 1));
                resetToolbarHide();

                await refreshBookmarks();

            } catch (err) {
                console.error('Failed to load comic:', err);
                showError(err.message);
            }
        }

        // ── Bookmarks ──

        async function refreshBookmarks() {
            try {
                const resp = await fetch('/api/comic/bookmarks');
                const data = await resp.json();
                allBookmarks = data.bookmarks || [];
            } catch (err) {
                allBookmarks = [];
            }
            renderBookmarks();
        }

        async function saveBookmarkFromSnapshot(snapshot, note) {
            try {
                await fetch('/api/comic/bookmark', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        file_path: filePath,
                        page: snapshot.page,
                        note: note || '',
                        total_pages: totalPages,
                    }),
                });
                await refreshBookmarks();
            } catch (err) {
                console.error('Failed to add bookmark:', err);
            }
        }

        function hasBookmarkNearCurrentPage() {
            return allBookmarks.some(bm => bm.file_path === filePath && bm.page === currentPage);
        }

        document.getElementById('bookmark-now-btn').addEventListener('click', () => {
            const snapshot = { page: currentPage };
            showConfirm(
                `Bookmark page ${currentPage + 1} / ${totalPages}<br>Add a description?`,
                [
                    { label: 'Yes', primary: true, action: () => showDescriptionPrompt(snapshot) },
                    { label: 'No', action: () => saveBookmarkFromSnapshot(snapshot, '') },
                    { label: 'Cancel', action: () => {} },
                ]
            );
        });

        function showDescriptionPrompt(snapshot) {
            const dialog = document.getElementById('confirm-dialog');
            document.getElementById('confirm-message').innerHTML = 'Enter bookmark description:';
            const container = document.getElementById('confirm-buttons');
            container.innerHTML = '';

            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Description...';
            input.style.cssText = 'width:100%;padding:8px;border:1px solid #0f3460;border-radius:4px;background:#1a1a2e;color:#e0e0e0;font-size:0.85rem;margin-bottom:12px;';
            input.addEventListener('keydown', (e) => { e.stopPropagation(); if (e.key === 'Enter') doSave(); });
            input.addEventListener('keyup', (e) => e.stopPropagation());
            input.addEventListener('keypress', (e) => e.stopPropagation());
            container.parentElement.insertBefore(input, container);

            const saveBtn = document.createElement('button');
            saveBtn.textContent = 'Save';
            saveBtn.className = 'primary';

            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Cancel';

            async function doSave() {
                const note = input.value.trim();
                input.remove();
                dialog.classList.remove('show');
                await saveBookmarkFromSnapshot(snapshot, note);
            }

            saveBtn.addEventListener('click', doSave);

            cancelBtn.addEventListener('click', () => {
                input.remove();
                dialog.classList.remove('show');
            });

            container.appendChild(saveBtn);
            container.appendChild(cancelBtn);
            dialog.classList.add('show');
            setTimeout(() => input.focus(), 50);
        }

        function renderBookmarks() {
            const ul = document.getElementById('bookmarks-list');
            ul.innerHTML = '';

            if (allBookmarks.length === 0) {
                ul.innerHTML = '<div id="bookmarks-empty">No bookmarks yet</div>';
                return;
            }

            const grouped = {};
            for (const bm of allBookmarks) {
                const key = bm.file_path;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(bm);
            }

            const keys = Object.keys(grouped).sort((a, b) => {
                if (a === filePath) return -1;
                if (b === filePath) return 1;
                return a.localeCompare(b);
            });

            for (const key of keys) {
                const isCurrentBook = key === filePath;
                const bookTitle = grouped[key][0].book_title || key.split('/').pop();

                const header = document.createElement('li');
                header.className = 'bm-section';
                header.textContent = bookTitle + (isCurrentBook ? ' (current)' : '');
                ul.appendChild(header);

                for (const bm of grouped[key]) {
                    const li = document.createElement('li');
                    if (isCurrentBook) li.className = 'current-book';

                    const savedDate = bm.created_at ? formatDate(bm.created_at) : '';
                    const tp = bm.total_pages || '?';

                    const bmFileName = bm.book_title || bm.file_path.split('/').pop();

                    li.innerHTML = `
                        <div class="bm-info">
                            <div class="bm-page">Page ${bm.page + 1} / ${tp}</div>
                            <div class="bm-file">${escHtml(bmFileName)}</div>
                            ${savedDate ? `<div class="bm-date">${savedDate}</div>` : ''}
                            ${bm.note ? `<div class="bm-note">${escHtml(bm.note)}</div>` : ''}
                        </div>
                        <span class="bm-delete" title="Delete bookmark">x</span>
                    `;

                    li.querySelector('.bm-info').addEventListener('click', () => {
                        if (isCurrentBook) {
                            jumpToBookmark(bm);
                        } else {
                            window.location.href = `/reader?path=${encodeURIComponent(bm.file_path)}&page=${bm.page}`;
                        }
                    });

                    li.querySelector('.bm-delete').addEventListener('click', async (e) => {
                        e.stopPropagation();
                        try {
                            await fetch(`/api/comic/bookmark/${bm.id}`, { method: 'DELETE' });
                            allBookmarks = allBookmarks.filter(b => b.id !== bm.id);
                            renderBookmarks();
                        } catch (err) {
                            console.error('Failed to delete bookmark:', err);
                        }
                    });

                    ul.appendChild(li);
                }
            }
        }

        function jumpToBookmark(bm) {
            showConfirm(
                `Go to page ${bm.page + 1}?<br>Delete this bookmark after jumping?`,
                [
                    { label: 'Yes, delete', primary: true, action: async () => {
                        showPage(bm.page);
                        try {
                            await fetch(`/api/comic/bookmark/${bm.id}`, { method: 'DELETE' });
                            allBookmarks = allBookmarks.filter(b => b.id !== bm.id);
                            renderBookmarks();
                        } catch (err) { console.error(err); }
                    }},
                    { label: 'No, keep', action: () => showPage(bm.page) },
                    { label: 'Cancel', action: () => {} },
                ]
            );
        }

        // Back button with bookmark prompt
        document.getElementById('back-btn').addEventListener('click', (e) => {
            if (!totalPages || hasBookmarkNearCurrentPage()) return;
            e.preventDefault();
            showConfirm(
                'Save a bookmark at the current page before leaving?',
                [
                    { label: 'Yes', primary: true, action: async () => {
                        await saveBookmarkFromSnapshot({ page: currentPage }, '');
                        window.location.href = '/';
                    }},
                    { label: 'No', action: () => { window.location.href = '/'; }},
                ]
            );
        });

        // Collapse/expand bookmarks panel
        document.getElementById('bookmarks-collapse-btn').addEventListener('click', () => {
            document.getElementById('bookmarks-panel').classList.add('collapsed');
            document.getElementById('bookmarks-tab').style.display = 'block';
        });

        document.getElementById('bookmarks-tab').addEventListener('click', () => {
            document.getElementById('bookmarks-panel').classList.remove('collapsed');
            document.getElementById('bookmarks-tab').style.display = 'none';
        });

        // Confirm dialog helper
        function showConfirm(message, buttons) {
            const dialog = document.getElementById('confirm-dialog');
            document.getElementById('confirm-message').innerHTML = message;
            const container = document.getElementById('confirm-buttons');
            container.innerHTML = '';
            buttons.forEach(b => {
                const btn = document.createElement('button');
                btn.textContent = b.label;
                if (b.primary) btn.className = 'primary';
                btn.addEventListener('click', () => {
                    dialog.classList.remove('show');
                    if (b.action) b.action();
                });
                container.appendChild(btn);
            });
            dialog.classList.add('show');
        }

        // Helpers
        function formatDate(epoch) {
            const d = new Date(epoch * 1000);
            const day = d.getDate();
            const mon = d.toLocaleString('default', { month: 'short' });
            const yr = d.getFullYear();
            const h = d.getHours();
            const m = String(d.getMinutes()).padStart(2, '0');
            return `${day} ${mon} ${yr}, ${h}:${m}`;
        }

        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        loadComic();
    </script>
</body>
</html>
